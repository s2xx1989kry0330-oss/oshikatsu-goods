<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>推し活グッズ帳（クラウド版）</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="グッズ帳">
<meta name="theme-color" content="#FBF7FC">
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxODAiIGhlaWdodD0iMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjRkY2RkE1Ii8+PGNpcmNsZSBjeD0iOTAiIGN5PSI5MCIgcj0iNTQiIGZpbGw9IiNGRkZGRkYiLz48Y2lyY2xlIGN4PSI5MCIgY3k9IjkwIiByPSI0MCIgZmlsbD0iI0ZGNkZBNSIvPjxjaXJjbGUgY3g9IjkwIiBjeT0iOTAiIHI9IjE0IiBmaWxsPSIjRkZGRkZGIi8+PC9zdmc+">
<style>
  :root{
    --bg: #FBF7FC; --pink: #FF6FA5; --pink-deep: #E84C89; --pink-soft: #FFE3EE;
    --blue: #6FCBFF; --blue-soft: #E3F4FF; --gold: #FFD166; --gold-soft: #FFF3D6;
    --ink: #2B2438; --ink-soft: #7A7188; --card: #FFFFFF; --line: #ECE4F2;
    --blue-ink: #1E7FBF; --gold-ink: #B8860B;
    --radius: 20px; --shadow: 0 6px 20px rgba(43,36,56,0.08);
  }
  html[data-theme="navy"]{
    --bg: #0F1626; --pink: #E8B44C; --pink-deep: #C9932A; --pink-soft: #24304C;
    --blue: #7FA8D9; --blue-soft: #1C2740; --blue-ink: #9CC4F2;
    --gold: #E8B44C; --gold-soft: #2A2410; --gold-ink: #F0C868;
    --ink: #EDEFF5; --ink-soft: #8C93AC; --card: #16203A; --line: #24304F;
    --shadow: 0 6px 20px rgba(0,0,0,0.35);
  }
  html[data-theme="mint"]{
    --bg: #F4FBF8; --pink: #A78BFA; --pink-deep: #7C5CE0; --pink-soft: #EDE7FE;
    --blue: #5FD9B4; --blue-soft: #DFFAF1; --blue-ink: #1E9C79;
    --gold: #FFD166; --gold-soft: #FFF3D6; --gold-ink: #B8860B;
    --ink: #2B3A39; --ink-soft: #7C8C89; --card: #FFFFFF; --line: #E3F1EC;
    --shadow: 0 6px 20px rgba(60,120,100,0.10);
  }
  html[data-theme="mono"]{
    --bg: #121212; --pink: #FF4B5C; --pink-deep: #E5303F; --pink-soft: #2A1417;
    --blue: #B5B5B5; --blue-soft: #2A2A2A; --blue-ink: #D8D8D8;
    --gold: #FF4B5C; --gold-soft: #2A1417; --gold-ink: #FF8A94;
    --ink: #F2F2F2; --ink-soft: #9A9A9A; --card: #1C1C1C; --line: #2E2E2E;
    --shadow: 0 6px 20px rgba(0,0,0,0.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; overscroll-behavior-y:none;}
  h1,h2,h3, .display{font-family:inherit; font-weight:900;}
  button{font-family:inherit; cursor:pointer;}
  input, select, textarea{font-family:inherit;}
  ::-webkit-scrollbar{display:none;}

  .app{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative;}

  /* ---------- Sign-in screen ---------- */
  .signin-screen{
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:40px 24px; text-align:center; gap:18px;
  }
  .signin-pin{
    width:88px; height:88px; border-radius:50%; background:var(--card); box-shadow:var(--shadow), inset 0 0 0 3px #fff;
    border:3px solid var(--pink); display:flex; align-items:center; justify-content:center; font-size:34px;
  }
  .signin-screen h1{font-size:22px; margin:0;}
  .signin-screen p{font-size:13.5px; color:var(--ink-soft); line-height:1.7; max-width:320px; margin:0;}
  .googlebtn{
    display:flex; align-items:center; justify-content:center; gap:10px;
    background:#fff; color:#3C4043; border:1px solid #DADCE0; border-radius:14px; padding:13px 22px;
    font-size:14px; font-weight:700; box-shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  .synctag{
    display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:var(--ink-soft);
    background:var(--card); border:1px solid var(--line); padding:5px 12px; border-radius:999px;
  }
  .dot-live{width:7px; height:7px; border-radius:50%; background:#3DDC84; box-shadow:0 0 0 3px rgba(61,220,132,0.25);}

  /* ---------- Header ---------- */
  header{padding: 22px 18px 16px; position: sticky; top:0; z-index:20; background: linear-gradient(180deg, var(--bg) 70%, rgba(251,247,252,0));}
  .titlebar{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:8px;}
  .titlebar h1{font-size:22px; margin:0; letter-spacing:.5px; display:flex; align-items:center; gap:8px;}
  .titlebar h1 .pin{width:10px;height:10px;border-radius:50%; background:var(--pink); box-shadow:0 0 0 3px var(--pink-soft); display:inline-block;}
  .backbtn{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:8px 12px; font-size:13px; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:4px; box-shadow:var(--shadow);}
  .menubtn{background:var(--card); border:1px solid var(--line); border-radius:50%; width:38px; height:38px; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); font-size:18px; flex:none;}
  .headerbtns{display:flex; gap:8px; align-items:center;}

  .stats{display:flex; gap:10px;}
  .stat{flex:1; background:var(--card); border-radius:16px; padding:10px 12px; box-shadow:var(--shadow); border:1px solid var(--line);}
  .stat .label{font-size:11px; color:var(--ink-soft); font-weight:700; margin-bottom:2px;}
  .stat .value{font-size:18px; font-weight:900;}
  .stat.pink .value{color:var(--pink-deep);}
  .stat.gold .value{color:var(--gold-ink);}

  main{flex:1; padding: 0 18px 100px;}

  .badge-grid{display:grid; grid-template-columns: repeat(3, 1fr); gap:18px 14px; margin-top:10px;}
  .badge{display:flex; flex-direction:column; align-items:center; gap:8px; position:relative; background:none; border:none; padding:0;}
  .badge-pin{width:78px; height:78px; border-radius:50%; background: var(--card); box-shadow: var(--shadow), inset 0 0 0 3px #fff; display:flex; align-items:center; justify-content:center; position:relative; font-size:26px; font-weight:900; overflow:hidden; border: 3px solid var(--ring, var(--pink));}
  .badge-pin::before{content:''; position:absolute; top:6px; left:14px; width:16px; height:8px; border-radius:50%; background:rgba(255,255,255,0.55); transform:rotate(-20deg);}
  .badge-pin img{width:100%;height:100%;object-fit:cover;}
  .badge-name{font-size:12.5px; font-weight:700; text-align:center; line-height:1.3; max-width:84px;}
  .badge-count{font-size:10.5px; color:var(--ink-soft); font-weight:700;}
  .badge-add .badge-pin{border-style:dashed; color:var(--ink-soft); background:var(--card);}
  .badge{touch-action:pan-y;}
  .badge.dragging{opacity:0.3;}
  .drag-ghost{position:fixed; pointer-events:none; z-index:200; width:78px; display:flex; flex-direction:column; align-items:center; gap:8px; transform:translate(-50%,-50%) scale(1.08); filter:drop-shadow(0 10px 16px rgba(0,0,0,0.25));}

  .empty{text-align:center; padding:60px 20px; color:var(--ink-soft);}
  .empty .display{font-size:20px; color:var(--ink); margin-bottom:8px;}

  .toolbar{display:flex; flex-direction:column; gap:10px; margin-bottom:14px;}
  .searchrow{display:flex; gap:8px;}
  .searchbox{flex:1; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 14px; font-size:14px; box-shadow:var(--shadow); color:var(--ink);}
  .sortselect{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 10px; font-size:13px; box-shadow:var(--shadow); font-weight:700; color:var(--ink);}
  .chiprow{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px;}
  .chip{flex:none; padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:700; background:var(--card); border:1px solid var(--line); color:var(--ink-soft); white-space:nowrap;}
  .chip.active{background:var(--pink); color:#fff; border-color:var(--pink);}

  .item-grid{display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-top:4px;}
  .item-card{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; border:1px solid var(--line); display:flex; flex-direction:column; text-align:left; position:relative;}
  .item-img{width:100%; aspect-ratio:1/1; background:var(--pink-soft); display:flex; align-items:center; justify-content:center; overflow:hidden; font-size:28px; position:relative;}
  .item-img img{width:100%; height:100%; object-fit:cover;}
  .item-body{padding:10px 12px 12px;}
  .item-cat{display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; background:var(--blue-soft); color:var(--blue-ink); margin-bottom:6px;}
  .item-name{font-size:13.5px; font-weight:700; line-height:1.3; margin-bottom:6px; min-height:34px;}
  .item-price-row{display:flex; justify-content:space-between; align-items:baseline;}
  .item-price{font-size:15px; font-weight:900; color:var(--pink-deep);}
  .item-qty{font-size:12px; color:var(--ink-soft); font-weight:700;}
  .item-sub{font-size:10.5px; color:var(--ink-soft); margin-top:4px;}

  .fab{position:fixed; right:20px; bottom:26px; width:58px; height:58px; border-radius:50%; background: var(--pink); color:#fff; border:none; font-size:28px; box-shadow:0 10px 24px rgba(255,111,165,0.45); display:flex; align-items:center; justify-content:center; z-index:30;}

  .backupbar{display:flex; gap:8px; padding:6px 0 4px;}
  .backupbtn{flex:1; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:9px; font-size:12px; font-weight:700; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; gap:6px; color:var(--ink);}

  .overlay{position:fixed; inset:0; background:rgba(43,36,56,0.45); z-index:50; display:none; align-items:flex-end; justify-content:center;}
  .overlay.show{display:flex;}
  .sheet{background:var(--bg); width:100%; max-width:520px; border-radius:24px 24px 0 0; max-height:92vh; overflow-y:auto; padding:20px 20px 30px; animation: slideup .25s ease;}
  @keyframes slideup{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .sheet h2{font-size:19px; margin:0 0 16px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:6px;}
  .field input[type=text], .field input[type=number], .field input[type=date], .field select, .field textarea{width:100%; padding:11px 14px; border-radius:14px; border:1px solid var(--line); background:var(--card); font-size:14px; color:var(--ink);}
  .field textarea{resize:vertical; min-height:60px;}
  .imgpick{width:100%; aspect-ratio:1.6/1; border-radius:16px; border:2px dashed var(--line); background:var(--card); display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--ink-soft); font-size:13px; gap:6px; overflow:hidden; position:relative;}
  .imgpick img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
  .multi-img-row{display:flex; gap:10px; flex-wrap:wrap;}
  .multi-img-thumb{position:relative; width:84px; height:84px; border-radius:14px; overflow:hidden; border:1px solid var(--line);}
  .multi-img-thumb img{width:100%; height:100%; object-fit:cover;}
  .multi-img-thumb .rm-btn{position:absolute; top:3px; right:3px; width:20px; height:20px; border-radius:50%; background:rgba(20,18,28,0.7); color:#fff; border:none; font-size:12px; display:flex; align-items:center; justify-content:center;}
  .multi-img-add{width:84px; height:84px; border-radius:14px; border:2px dashed var(--line); background:var(--card); display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--ink-soft);}
  .item-img-badge{position:absolute; bottom:6px; right:6px; background:rgba(20,18,28,0.75); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px;}
  .colorrow{display:flex; gap:10px; flex-wrap:wrap;}
  .colordot{width:34px; height:34px; border-radius:50%; border:3px solid transparent;}
  .colordot.sel{border-color:var(--ink);}
  .hexrow{display:flex; align-items:center; gap:10px; margin-top:10px;}
  .hexpreview{width:34px; height:34px; border-radius:50%; border:2px solid var(--line); flex:none;}
  .hexrow input{flex:1; padding:10px 12px; border-radius:12px; border:1px solid var(--line); background:var(--card); font-size:13px; color:var(--ink); text-transform:uppercase;}
  .sheet-actions{display:flex; gap:10px; margin-top:8px;}
  .btn{flex:1; padding:13px; border-radius:14px; border:none; font-weight:700; font-size:14px;}
  .btn.primary{background:var(--pink); color:#fff;}
  .btn.ghost{background:var(--card); border:1px solid var(--line); color:var(--ink);}
  .btn.danger{background:#FFE6E6; color:#C0392B;}
  .hidden{display:none !important;}
  input[type=file]{display:none;}
  .modal-stepper{display:flex; align-items:center; gap:8px;}
  .modal-qty-btn{width:38px; height:38px; flex:none; border-radius:12px; border:1px solid var(--line); background:var(--pink-soft); color:var(--pink-deep); font-size:18px; font-weight:900; display:flex; align-items:center; justify-content:center;}
  .modal-qty-btn:active{background:var(--pink); color:#fff;}
  #itemQtyInput{text-align:center;}
  .status-btn{flex:1; padding:11px; border-radius:12px; border:1px solid var(--line); background:var(--card); color:var(--ink-soft); font-size:13px; font-weight:700;}
  .status-btn.active{background:var(--pink); color:#fff; border-color:var(--pink);}
  .item-status-tag{display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; background:var(--gold-soft); color:var(--gold-ink); margin-bottom:6px; margin-left:4px;}
  .graph-wrap{display:flex; align-items:flex-end; gap:6px; height:190px; overflow-x:auto; padding:10px 4px 6px; border-bottom:1px solid var(--line);}
  .graph-bar-col{display:flex; flex-direction:column; align-items:center; gap:6px; flex:none; width:32px; justify-content:flex-end; height:100%;}
  .graph-bar{width:18px; border-radius:6px 6px 0 0; background:var(--pink); min-height:2px;}
  .graph-amt{font-size:8.5px; color:var(--ink-soft); font-weight:700; white-space:nowrap;}
  .graph-label{font-size:10px; color:var(--ink-soft); font-weight:700;}
  .theme-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
  .theme-card{background:var(--card); border:2px solid var(--line); border-radius:16px; padding:10px; display:flex; flex-direction:column; align-items:center; gap:8px; font-size:12px; font-weight:700; color:var(--ink);}
  .theme-card.active{border-color:var(--pink);}
  .theme-preview{width:100%; height:36px; border-radius:10px;}
  .toast{position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(20,18,28,0.94); color:#fff; padding:10px 18px; border-radius:999px; font-size:13px; font-weight:700; z-index:80; opacity:0; transition:opacity .25s;}
  .toast.show{opacity:1;}
  .searchsitebtn{margin-top:8px; width:100%; padding:9px; border-radius:12px; border:1px solid var(--line); background:var(--blue-soft); color:var(--blue-ink); font-size:12.5px; font-weight:700;}
  .suggestrow{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}
  .suggest-chip{padding:6px 12px; border-radius:999px; font-size:12px; font-weight:700; background:var(--gold-soft); color:var(--gold-ink); border:1px solid var(--gold);}
  .scanbtn{width:100%; margin-bottom:10px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:11px; font-size:13px; font-weight:700; color:var(--ink); box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; gap:8px;}
  .scanbtn:disabled{opacity:0.4;}
  .scan-progress{font-size:12px; color:var(--ink-soft); font-weight:700; text-align:center; margin-bottom:10px;}
  .scan-field-row{display:flex; gap:10px;}
  .spinner{width:22px; height:22px; border-radius:50%; border:3px solid var(--line); border-top-color:var(--pink); animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- Sign-in screen -->
<div class="signin-screen" id="signinScreen">
  <div class="signin-pin">🎀</div>
  <h1>推し活グッズ帳</h1>
  <p>Googleアカウントでログインすると、データがクラウドに自動保存されて、他の端末でも同じコレクションをリアルタイムに見られるようになるよ。</p>
  <button class="googlebtn" id="googleSignInBtn">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C33.6 5.1 29 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.4-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 18.9 12 24 12c3.1 0 5.8 1.1 8 3l6-6C33.6 5.1 29 3 24 3 16.3 3 9.7 7.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 45c5 0 9.5-1.9 12.9-5.1l-6-4.9c-2 1.4-4.6 2.3-6.9 2.3-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.6 40.6 16.2 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6 4.9C40.6 35.9 44 30.4 44 24c0-1.4-.1-2.7-.4-3.5z"/></svg>
    Googleでログイン
  </button>
  <span class="synctag" id="signinLoadingTag" style="display:none;"><div class="spinner" style="width:12px;height:12px;border-width:2px;"></div> 接続中…</span>
</div>

<div class="app hidden" id="appRoot">
  <header>
    <div class="titlebar" id="titlebar">
      <h1 id="pageTitle"><span class="pin"></span>推し活グッズ帳</h1>
      <div class="headerbtns">
        <span class="synctag"><span class="dot-live"></span>同期中</span>
        <button class="menubtn" id="statsGraphBtn">📊</button>
        <button class="menubtn" id="backupOpenBtn">⋮</button>
      </div>
    </div>
    <div class="stats" id="statsRow"></div>
  </header>
  <main id="mainArea"></main>
</div>

<button class="fab hidden" id="fabBtn">＋</button>
<div class="toast" id="toast"></div>

<!-- Character modal -->
<div class="overlay" id="charOverlay">
  <div class="sheet">
    <h2 id="charModalTitle">キャラを追加</h2>
    <div class="field">
      <label>アイコン画像（任意）</label>
      <div class="imgpick" id="charImgPick"><span id="charImgPickLabel">タップして画像を選ぶ</span></div>
      <input type="file" id="charImgInput" accept="image/*">
    </div>
    <div class="field">
      <label>キャラクター名</label>
      <input type="text" id="charNameInput" placeholder="例）衛藤桐也">
    </div>
    <div class="field">
      <label>公式通販URL（任意・商品検索に使うよ）</label>
      <input type="text" id="charShopUrlInput" placeholder="例）https://shop.nijisanji.jp/...">
    </div>
    <div class="field">
      <label>バッジカラー</label>
      <div class="colorrow" id="colorRow"></div>
      <div class="hexrow">
        <div class="hexpreview" id="hexPreview"></div>
        <input type="text" id="charHexInput" placeholder="#FF6FA5" maxlength="7">
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" id="charCancelBtn">キャンセル</button>
      <button class="btn primary" id="charSaveBtn">保存する</button>
    </div>
    <div class="sheet-actions" id="charDeleteRow" style="margin-top:4px;">
      <button class="btn danger" id="charDeleteBtn">このキャラを削除</button>
    </div>
  </div>
</div>

<!-- Item modal -->
<div class="overlay" id="itemOverlay">
  <div class="sheet">
    <h2 id="itemModalTitle">グッズを追加</h2>
    <div class="field">
      <label>商品画像（複数枚OK・任意）</label>
      <div class="multi-img-row" id="itemImgRow"></div>
      <input type="file" id="itemImgInput" accept="image/*" multiple>
    </div>
    <div class="field">
      <label>商品名</label>
      <input type="text" id="itemNameInput" placeholder="例）缶バッジ（サイクリングver.）">
      <button type="button" class="searchsitebtn hidden" id="searchSiteBtn">🔍 公式サイト内で調べる</button>
      <div class="suggestrow hidden" id="nameSuggestRow"></div>
    </div>
    <div class="field">

function compressImageFile(file, maxDim=640, quality=0.65){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = ()=> reject(new Error('画像の読み込みに失敗したよ'));
      img.src = e.target.result;
    };
    reader.onerror = ()=> reject(new Error('ファイルの読み込みに失敗したよ'));
    reader.readAsDataURL(file);
  });
}
function totalImageBytes(images){

/* ---------------- Realtime sync ---------------- */
function startSync(){
  const charsCol = collection(db, 'users', uid, 'characters');
  const itemsCol = collection(db, 'users', uid, 'items');
  const settingsDoc = doc(db, 'users', uid, 'meta', 'settings');

  unsubChars = onSnapshot(query(charsCol), (snap)=>{
    if(!dragCtx){
      state.characters = snap.docs.map(d=>({ id:d.id, ...d.data() }))
        .sort((a,b)=>{
          const ao=a.order, bo=b.order;
          if(ao!=null && bo!=null) return ao-bo;
          if(ao!=null) return -1;
          if(bo!=null) return 1;
          return (a.createdAt?.seconds||0)-(b.createdAt?.seconds||0);
        });
    }
    render();
  }, (err)=> showToast('キャラの同期でエラー: ' + err.message));

  unsubItems = onSnapshot(query(itemsCol), (snap)=>{
    state.items = snap.docs.map(d=>({ id:d.id, ...d.data() }))
      .sort((a,b)=> (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0));
    render();
  }, (err)=> showToast('グッズの同期でエラー: ' + err.message));

  unsubSettings = onSnapshot(settingsDoc, (snap)=>{
    if(snap.exists()){
      state.theme = snap.data().theme || 'pop';
    } else {
      setDoc(settingsDoc, { theme:'pop' });
      state.theme = 'pop';
    }
    applyTheme();

/* ---------------- Long-press drag reorder (characters) ---------------- */
function attachReorderHandlers(){
  document.querySelectorAll('#mainArea .badge[data-open]').forEach(badge=>{
    badge.onpointerdown = (e)=> onBadgePointerDown(e, badge);
    badge.oncontextmenu = (e)=> e.preventDefault();
  });
}
function onBadgePointerDown(e, badge){
  const id = badge.dataset.open;
  const startX = e.clientX, startY = e.clientY;
  let cancelled = false;
  const timer = setTimeout(()=>{
    if(cancelled) return;
    cleanup();
    beginDrag(id, badge);
  }, 420);
  function onMove(ev){
    if(Math.abs(ev.clientX-startX)>8 || Math.abs(ev.clientY-startY)>8){
      cancelled = true; clearTimeout(timer); cleanup();
    }
  }
  function onUp(){ cancelled = true; clearTimeout(timer); cleanup(); }
  function cleanup(){
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
  }
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}
function beginDrag(id, badge){
  if(navigator.vibrate){ try{ navigator.vibrate(15); }catch(e){} }
  const rect = badge.getBoundingClientRect();
  const ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.innerHTML = badge.innerHTML;
  ghost.style.left = (rect.left+rect.width/2)+'px';
  ghost.style.top = (rect.top+rect.height/2)+'px';
  document.body.appendChild(ghost);
  badge.classList.add('dragging');
  dragCtx = { id };

  function onMove(ev){
    ghost.style.left = ev.clientX+'px';
    ghost.style.top = ev.clientY+'px';
    const el = document.elementFromPoint(ev.clientX, ev.clientY);
    const overBadge = el && el.closest ? el.closest('.badge[data-open]') : null;
    if(overBadge && overBadge.dataset.open !== dragCtx.id){
      const fromIdx = state.characters.findIndex(c=>c.id===dragCtx.id);
      const toIdx = state.characters.findIndex(c=>c.id===overBadge.dataset.open);
      if(fromIdx>-1 && toIdx>-1){
        const [movedChar] = state.characters.splice(fromIdx,1);
        state.characters.splice(toIdx,0,movedChar);
        renderHome();
        const newBadge = document.querySelector(`.badge[data-open="${dragCtx.id}"]`);
        if(newBadge) newBadge.classList.add('dragging');
      }
    }
  }
  function onUp(){
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    ghost.remove();
    const finalBadge = document.querySelector(`.badge[data-open="${dragCtx.id}"]`);
    if(finalBadge) finalBadge.classList.remove('dragging');
    justDragged = true;
    setTimeout(()=>{ justDragged = false; }, 80);
    persistCharacterOrder();
    dragCtx = null;
  }
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}
async function persistCharacterOrder(){
  try{
    await Promise.all(state.characters.map((c, idx)=> updateDoc(doc(db,'users',uid,'characters',c.id), { order: idx })));

  let html = `

        ${seriesList.map(s=>`<button class="chip ${filter.series===s?'active':''}" data-series="${s}">${s==='ALL'?'すべてのシリーズ':s}</button>`).join('')}
      </div>` : ''}
    </div>
  `;

  if(list.length===0){
    html += `<div class="empty"><div class="display">グッズがまだないよ</div><div>右下の＋から追加してね</div></div>`;
  } else {
    html += '<div class="item-grid">';
    list.forEach(i=>{
      html += `
        <div class="item-card" data-edit="${i.id}">
          <div class="item-img">${(()=>{ const imgs=getItemImages(i); return imgs.length ? `<img src="${imgs[0]}">${imgs.length>1?`<span class="item-img-badge">+${imgs.length-1}</span>`:''}` : '🎀'; })()}</div>
          <div class="item-body">
            ${i.category ? `<span class="item-cat">${i.category}</span>` : ''}
            ${i.series ? `<span class="item-cat" style="background:var(--pink-soft); color:var(--pink-deep);">${i.series}</span>` : ''}
            ${i.status==='unopened' ? `<span class="item-status-tag">未開封</span>` : ''}
            <div class="item-name">${i.name}</div>
            <div class="item-price-row">
              <span class="item-price">${fmtYen(i.price)}</span>
              <span class="item-qty">×${i.qty}</span>
            </div>
            <div class="item-sub">小計 ${fmtYen(Number(i.price||0)*Number(i.qty||0))}</div>
          </div>

/* ---------------- Name auto-extract (series / category / price) ---------------- */
function parseItemNameInput(raw){
  let name = raw;
  let seriesGuess = null, priceGuess = null, categoryGuess = null;

  const seriesMatch = name.match(/【([^】]+)】/);
  if(seriesMatch){ seriesGuess = seriesMatch[1]; name = name.replace(seriesMatch[0], '').trim(); }

  const priceMatch = name.match(/¥\s?([\d,]+)|([\d,]+)\s?円/);
  if(priceMatch){
    const numRaw = (priceMatch[1]||priceMatch[2]).replace(/,/g,'');
    priceGuess = Number(numRaw);
    name = name.replace(priceMatch[0], '').replace(/税込/g,'').trim();
  }
  name = name.replace(/\s+/g,' ').trim();
  const matches = CATEGORY_LIST.filter(c => name.includes(c));
  categoryGuess = matches.length ? matches.sort((a,b)=>b.length-a.length)[0] : null;

  return { name, seriesGuess, priceGuess, categoryGuess };
}
function handleNameAutoExtract(raw){
  const { name, seriesGuess, priceGuess, categoryGuess } = parseItemNameInput(raw);
  document.getElementById('itemNameInput').value = name;
  if(priceGuess !== null){
    document.getElementById('itemPriceInput').value = priceGuess;
  }
  const row = document.getElementById('nameSuggestRow');
  row.innerHTML = '';
  let hasSuggestion = false;
  if(seriesGuess){
    hasSuggestion = true;
    const chip = document.createElement('button');
    chip.type = 'button'; chip.className = 'suggest-chip';
    chip.textContent = `シリーズ: ${seriesGuess} ✓`;
    chip.onclick = ()=>{ document.getElementById('itemSeriesInput').value = seriesGuess; chip.remove(); };
    row.appendChild(chip);
  }
  if(categoryGuess){
    hasSuggestion = true;
    const chip = document.createElement('button');
    chip.type = 'button'; chip.className = 'suggest-chip';
    chip.textContent = `カテゴリ: ${categoryGuess} ✓`;
    chip.onclick = ()=>{ document.getElementById('itemCatInput').value = categoryGuess; chip.remove(); };
    row.appendChild(chip);
  }
  row.classList.toggle('hidden', !hasSuggestion);
  if(priceGuess !== null) showToast(`価格 ¥${priceGuess.toLocaleString('ja-JP')} を自動入力したよ`);
}

/* ---------------- Receipt scan (Gemini API, client-side, free tier) ---------------- */
function fileToBase64Raw(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const result = reader.result;
      const base64 = result.split(',')[1];
      resolve({ base64, mimeType: file.type || 'image/jpeg' });
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function callGeminiReceiptExtract(base64, mimeType){
  const prompt = `この画像は推し活グッズの注文控え・購入履歴・領収書・コレクション管理アプリの一覧画面のいずれかです。写っている商品をすべて抽出してください。
出力はJSON配列のみで、説明文やマークダウンのコードブロックは一切つけないでください。
各要素は次の形式にしてください:
{"name": "商品名をそのまま正確に書き写す。先頭に【〇〇】のような表記があれば、それも省略せずそのまま含めること", "qty": 個数（数値、不明なら1）, "price": 単価（数値・円、不明なら0）}
商品が1つも読み取れない場合は空配列 [] を返してください。`;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent`;
  const body = {
    contents: [{ parts: [ { text: prompt }, { inline_data: { mime_type: mimeType, data: base64 } } ] }]
  };
  const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json', 'X-goog-api-key': GEMINI_API_KEY}, body: JSON.stringify(body) });
  if(!res.ok){ throw new Error('Gemini APIエラー (' + res.status + ')'); }
  const data = await res.json();
  let text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '[]';
  text = text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  let items;
  try{ items = JSON.parse(text); }catch(e){ throw new Error('読み取り結果の解析に失敗したよ'); }
  if(!Array.isArray(items)) throw new Error('読み取り結果の形式が想定外だったよ');
  return items.map(it=>{
    const rawName = String(it.name||'').trim();
    if(!rawName) return null;
    // AIが読み取った商品名から、既存の【】/キーワード抽出ロジックでシリーズ・カテゴリを機械的に分離する
    const parsed = parseItemNameInput(rawName);
    return {
      name: parsed.name,
      series: parsed.seriesGuess || '',
      category: parsed.categoryGuess || '',
      qty: Number(it.qty)||1,
      price: Number(it.price)||0
    };
  }).filter(Boolean);
}

        </div>
      </div>
      <div class="field scan-field-row">
        <div style="flex:1;">
          <label>価格（円）</label>
          <input type="number" id="scanPrice" value="${cur.price}">
        </div>
        <div style="flex:1;">
          <label>個数</label>
          <input type="number" id="scanQty" value="${cur.qty}">
        </div>
      </div>
      <div class="sheet-actions">
        <button class="btn ghost" id="scanSkipBtn">スキップ</button>
        <button class="btn primary" id="scanAddBtn">追加する</button>
      </div>
      ${remaining>1 ? `<div class="sheet-actions" style="margin-top:8px;">
        <button class="btn ghost" id="scanBulkBtn">残り${remaining}件をこのまま全部追加</button>
      </div>` : ''}
    `;
    document.getElementById('scanSkipBtn').onclick = ()=>{ index++; showCurrent(); };
    document.getElementById('scanAddBtn').onclick = async ()=>{
      const name = document.getElementById('scanName').value.trim();
      if(!name){ showToast('商品名を入力してね'); return; }
      const series = document.getElementById('scanSeries').value.trim();

    if(bulkBtn){
      bulkBtn.onclick = async ()=>{
        if(!confirm(`残り${remaining}件を確認なしでそのまま追加する？`)) return;
        bulkBtn.textContent = '追加中…';
        for(let i=index; i<items.length; i++){
          try{ await addOne(items[i]); }catch(e){}
        }
        index = items.length;
        showCurrent();
      };
    }
  }
  showCurrent();
}

/* ---------------- Spending graph ---------------- */
function computeMonthlySpending(items){
  const map = {};
  items.forEach(i=>{
    const key = i.date ? i.date.slice(0,7) : 'nodate';
    const amt = Number(i.price||0)*Number(i.qty||0);
    map[key] = (map[key]||0) + amt;
  });
  return map;
}
function renderStatsGraph(){
  const inDetail = view.screen==='detail';
  const items = inDetail ? state.items.filter(i=>i.characterId===view.characterId) : state.items;
  const map = computeMonthlySpending(items);
  const now = new Date();
  const months = [];
  for(let i=11;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    months.push({ label: `${d.getMonth()+1}月`, value: map[key]||0 });
  }
  const noDateVal = map['nodate']||0;
  const maxVal = Math.max(1, ...months.map(m=>m.value), noDateVal);
  const total = months.reduce((s,m)=>s+m.value,0) + noDateVal;

  let html = `<p style="font-size:13px; font-weight:700; margin:0 0 10px;">直近12ヶ月の合計：${fmtYen(total)}</p><div class="graph-wrap">`;
  months.forEach(m=>{
    const h = Math.round((m.value/maxVal)*140);
    html += `<div class="graph-bar-col"><div class="graph-amt">${m.value>0?fmtYen(m.value):''}</div><div class="graph-bar" style="height:${Math.max(h,2)}px;"></div><div class="graph-label">${m.label}</div></div>`;
  });
  if(noDateVal>0){
    const h = Math.round((noDateVal/maxVal)*140);
    html += `<div class="graph-bar-col"><div class="graph-amt">${fmtYen(noDateVal)}</div><div class="graph-bar" style="height:${Math.max(h,2)}px; background:var(--ink-soft);"></div><div class="graph-label">日付なし</div></div>`;
  }
  html += `</div>`;
  const ch = inDetail ? state.characters.find(c=>c.id===view.characterId) : null;
  document.getElementById('statsGraphTitle').textContent = inDetail ? `支出の推移（${ch?ch.name:''}）` : '支出の推移（全体）';
  document.getElementById('statsGraphBody').innerHTML = html;
}
document.getElementById('statsGraphBtn').onclick = ()=>{ renderStatsGraph(); openModal('statsOverlay'); };
document.getElementById('statsGraphCloseBtn').onclick = ()=>closeModal('statsOverlay');
document.getElementById('backupCloseBtn').onclick = ()=>closeModal('backupOverlay');

/* ---------------- Manual JSON export (extra safety net) ---------------- */
document.getElementById('exportBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  a.href = url; a.download = `oshikatsu_backup_${stamp}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('書き出したよ');
};

document.getElementById('reExtractBtn').onclick = async ()=>{
  const targets = state.items.filter(it=>{
    const needsSeries = !it.series && /【([^】]+)】/.test(it.name||'');
    const needsCategory = !it.category;
    return needsSeries || needsCategory;
  });
  if(targets.length===0){ showToast('補完できそうなグッズはなかったよ'); return; }
  if(!confirm(`${targets.length}件のグッズを確認して、空欄のシリーズ・カテゴリを補完するね。実行する？`)) return;
  const btn = document.getElementById('reExtractBtn');
  let updatedCount = 0;
  for(let i=0; i<targets.length; i++){
    const it = targets[i];
    btn.textContent = `処理中… (${i+1}/${targets.length})`;
    const parsed = parseItemNameInput(it.name||'');
    const patch = {};
    if(!it.series && parsed.seriesGuess){ patch.series = parsed.seriesGuess; patch.name = parsed.name; }
    if(!it.category && parsed.categoryGuess){ patch.category = parsed.categoryGuess; }
    if(Object.keys(patch).length>0){
      try{ await updateDoc(doc(db,'users',uid,'items',it.id), patch); updatedCount++; }catch(e){}
    }
  }
  btn.textContent = '🔧 商品名からシリーズ・カテゴリを再抽出';
  showToast(`${updatedCount}件を補完したよ`);
};
</script>
</body>
</html>
